# =============================================================================
# REGIME-AWARE RISK MULTIPLIERS (Feature #3)
# =============================================================================
# Applied by get_regime_adjusted_params() to dynamically scale risk parameters.
# Volatility overlay further adjusts position_size_mult and stop_width_mult.

regime_multipliers:
  CHOPPY:
    position_size_mult: 0.5
    cooldown_mult: 2.0
    stop_width_mult: 1.0

  STRONG_TREND_UP:
    position_size_mult: 1.5
    cooldown_mult: 0.5
    stop_width_mult: 1.0

  STRONG_TREND_DOWN:
    position_size_mult: 1.5
    cooldown_mult: 0.5
    stop_width_mult: 1.0

  HIGH_VOLATILITY:
    position_size_mult: 0.3
    cooldown_mult: 1.0
    stop_width_mult: 1.5

  RANGING:
    position_size_mult: 0.7
    cooldown_mult: 1.5
    stop_width_mult: 1.0

  _DEFAULT:
    position_size_mult: 1.0
    cooldown_mult: 1.0
    stop_width_mult: 1.0

volatility_overlays:
  HIGH:
    description: "Applied when volatility_state is HIGH (unless regime is already HIGH_VOLATILITY)"
    position_size_mult_factor: 0.7
    stop_width_mult_factor: 1.3

  LOW:
    description: "Applied when volatility_state is LOW"
    stop_width_mult_factor: 0.8

# =============================================================================
# PERSISTENCE
# =============================================================================
# Safety state is persisted to disk so restarts cannot silently clear limits.

state_persistence:
  file: "data/risk_state.json"
  env_var: RUNECLAW_STATE_DIR
  default_dir: "data"
  persisted_fields:
    - circuit_open
    - consecutive_losses
    - last_loss_time
    - circuit_breaker_trips
    - saved_at
  corruption_behavior: >
    Missing file: fresh start. Empty file: fresh start.
    Corrupt file (non-empty invalid JSON): circuit breaker TRIPPED (fail-closed).
    I/O error: circuit breaker TRIPPED (fail-closed).
