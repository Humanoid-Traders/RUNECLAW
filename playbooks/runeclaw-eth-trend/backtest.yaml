venue:
  name: BITGET
  account_type: MARGIN
  oms_type: NETTING
  starting_balances:
    - amount: 100000
      currency: USDT

strategy:
  module: strategy
  class: RuneclawEthStrategy
  config_class: RuneclawEthStrategyConfig
  config:
    order_id_tag: "001"
    leverage: 10
    margin_budget: "100"
    max_loss_usdt: "15"
    entry_ttl_bars: 8
    window_bars_24h: 24
    min_score: 70
    eth_sl_min_pct: "1.5"
    atr_limit_mult: "0.5"
    tp1_pct: "3.5"

instruments:
  - id: ETHUSDT.BITGET
    kind: perpetual
    raw_symbol: ETHUSDT
    base_currency: ETH
    quote_currency: USDT
    settlement_currency: USDT
    price_precision: 2
    size_precision: 2
    price_increment: "0.01"
    size_increment: "0.01"
    lot_size: "0.01"
    maker_fee: "0.0002"
    taker_fee: "0.0006"
    bar_type: ETHUSDT.BITGET-1-HOUR-LAST-EXTERNAL
  - id: BTCUSDT.BITGET
    kind: perpetual
    raw_symbol: BTCUSDT
    base_currency: BTC
    quote_currency: USDT
    settlement_currency: USDT
    price_precision: 1
    size_precision: 4
    price_increment: "0.1"
    size_increment: "0.0001"
    lot_size: "0.0001"
    maker_fee: "0.0002"
    taker_fee: "0.0006"
    bar_type: BTCUSDT.BITGET-1-HOUR-LAST-EXTERNAL
