<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUNECLAW — Link your wallet</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="theme-color" content="#0a0b10">
<link rel="stylesheet" href="/styles.css?v=19">
<style>
  .wl-wrap { max-width: 460px; margin: 6vh auto; padding: 0 var(--s4); }
  .wl-brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: var(--s4); }
  .wl-brand .mark { font-family: var(--font-display, var(--font-ui)); letter-spacing: .14em; font-size: var(--fs-lg); color: var(--text-1); text-shadow: 0 0 18px var(--gold-dim, rgba(63,182,255,.35)); }
  .wl-card { background: var(--surface); border: 1px solid var(--line-2); border-radius: var(--radius-lg); padding: var(--s5); box-shadow: var(--shadow); }
  .wl-card h1 { font-size: var(--fs-lg); margin-bottom: var(--s2); display: flex; align-items: center; gap: 8px; }
  /* Status chip + spinner */
  .wl-status { display: flex; gap: 9px; align-items: flex-start; border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px 12px; background: var(--bg); color: var(--text-2); font-size: var(--fs-sm); line-height: 1.5; }
  .wl-status.busy .wl-spin { display: inline-block; }
  .wl-status.ok { border-color: var(--up); color: var(--up); }
  .wl-status.err { border-color: var(--down); }
  .wl-spin { display: none; flex: 0 0 14px; width: 14px; height: 14px; margin-top: 3px; border: 2px solid var(--line-2); border-top-color: var(--gold-bright); border-radius: 999px; animation: wlspin .8s linear infinite; }
  @keyframes wlspin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .wl-spin { animation: none; } }
  /* Wallet picker grid */
  .wl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: var(--s3); }
  .wl-wallet { display: flex; align-items: center; gap: 9px; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--surface-2); color: var(--text-1); text-decoration: none; font-size: var(--fs-sm); transition: transform .15s ease, border-color .18s ease; }
  .wl-wallet:hover, .wl-wallet:focus-visible { transform: translateY(-1px); border-color: var(--gold-bright); }
  .wl-wallet.primary { grid-column: 1 / -1; border-color: var(--gold-bright); background: var(--surface); }
  .wl-logo { flex: 0 0 24px; width: 24px; height: 24px; border-radius: 999px; display: grid; place-items: center; font-size: 11px; font-weight: 800; color: #fff; }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--gold-bright); outline-offset: 2px; border-radius: var(--radius-sm); }
</style>
</head>
<body>
<div class="wl-wrap" role="main">
  <div class="wl-brand"><span class="mark">⚔ RUNECLAW ⚔</span></div>
  <div class="wl-card">
    <h1>🔗 Link this wallet</h1>
    <p class="muted small" style="margin-bottom:var(--s3)">
      Read-only linking: your wallet signs <b>one login message</b> — never a
      transaction, never an approval. RUNECLAW can then mirror balances and
      DeFi positions; it can never move funds.
    </p>
    <div class="wl-status busy" id="statusBox" role="status" aria-live="polite">
      <span class="wl-spin" aria-hidden="true"></span>
      <div id="state" class="small">Checking for a wallet…</div>
    </div>
    <button class="btn btn--primary btn-block mt-3 hidden" id="linkBtn" type="button">Sign &amp; link wallet</button>
  </div>
</div>
<script>
(function () {
  var API = '/api';
  var state = document.getElementById('state');
  var box = document.getElementById('statusBox');
  var btn = document.getElementById('linkBtn');
  var code = new URLSearchParams(location.search).get('code') || '';

  // say(html[, mood]) — mood: 'busy' (spinner) | 'ok' | 'err' | '' (plain)
  function say(html, mood) {
    state.innerHTML = html;
    box.className = 'wl-status' + (mood ? ' ' + mood : '');
  }

  if (!/^[0-9a-f]{32}$/.test(code)) {
    say('This link is missing its code — scan the QR on your computer again.', 'err');
    return;
  }

  // Scanning the QR opens this page in the phone's NORMAL browser (Safari /
  // Chrome), which injects no signer — so window.ethereum is absent even
  // though MetaMask is installed. Two things fix the dead end: (1) an in-app
  // browser (MetaMask etc.) often injects the provider a beat AFTER load, so
  // wait briefly before giving up; (2) if there's still no provider, hand the
  // user a ONE-TAP deep link that reopens THIS page (code preserved) inside
  // MetaMask's own browser, where the signer exists.
  function waitForEthereum(cb) {
    if (window.ethereum) return cb(true);
    var tries = 0;
    var t = setInterval(function () {
      if (window.ethereum) { clearInterval(t); cb(true); }
      else if (++tries >= 10) { clearInterval(t); cb(false); }  // ~3s — some in-app browsers inject late
    }, 300);
  }

  function showNoWallet() {
    var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');
    if (isMobile) {
      var hostPathQuery = location.host + location.pathname + location.search;
      var full = location.href;
      var enc = encodeURIComponent(full);
      // Universal deep links that reopen THIS page (code preserved) inside each
      // wallet's own dApp browser, where window.ethereum exists. Documented
      // universal-link forms only (app-scheme guesses that silently fail are
      // worse than the copy-link fallback below, which covers every other wallet).
      // `color` is each wallet's brand color for its monogram mark — recognition
      // without external image requests (the page stays self-contained).
      var wallets = [
        { name: 'MetaMask', href: 'https://metamask.app.link/dapp/' + hostPathQuery, primary: true, color: '#f6851b', letter: 'M' },
        { name: 'Trust Wallet', href: 'https://link.trustwallet.com/open_url?url=' + enc, color: '#3375bb', letter: 'T' },
        { name: 'Coinbase Wallet', href: 'https://go.cb-w.com/dapp?cb_url=' + enc, color: '#0052ff', letter: 'C' },
        { name: 'Rainbow', href: 'https://rnbwapp.com/dapp?url=' + enc, color: '#8754c9', letter: 'R' },
        { name: 'Phantom', href: 'https://phantom.app/ul/browse/' + enc + '?ref=' + encodeURIComponent(location.origin), color: '#ab9ff2', letter: 'P' },
        { name: 'Uniswap Wallet', href: 'https://uniswap.org/app?dappUrl=' + enc, color: '#ff007a', letter: 'U' },
        { name: 'Zerion', href: 'https://link.zerion.io/905dU0Hd8ub?dappUrl=' + enc, color: '#2461ed', letter: 'Z' },
        { name: 'Bitget Wallet', href: 'https://bkcode.vip?action=dapp&url=' + enc, color: '#00cec4', letter: 'B' },
      ];
      say('This is your phone\'s browser, which has no wallet signer.<br><br>'
        + 'Tap your wallet to reopen this page <b>inside it</b> — it signs and '
        + 'links automatically. Don\'t see yours? <b>Copy the link</b> and paste '
        + 'it into your wallet\'s in-app browser.');
      var grid = document.createElement('div');
      grid.className = 'wl-grid';
      wallets.forEach(function (w) {
        var a = document.createElement('a');
        a.href = w.href;
        a.className = 'wl-wallet' + (w.primary ? ' primary' : '');
        a.rel = 'noopener';
        var logo = document.createElement('span');
        logo.className = 'wl-logo';
        logo.style.background = w.color;
        logo.textContent = w.letter;
        logo.setAttribute('aria-hidden', 'true');
        var label = document.createElement('span');
        label.textContent = 'Open in ' + w.name;
        a.appendChild(logo); a.appendChild(label);
        grid.appendChild(a);
      });
      box.parentNode.appendChild(grid);
      // Universal fallback: copy the link so ANY wallet (Rabby, OKX, imToken,
      // TokenPocket, Frame, Rainbow, …) can paste it into its dApp browser.
      var copy = document.createElement('button');
      copy.type = 'button';
      copy.className = 'btn btn-block mt-3';
      copy.textContent = '📋 Copy link for any other wallet';
      copy.onclick = function () {
        var done = function () { copy.textContent = '✅ Link copied — paste in your wallet\'s browser'; };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(full).then(done).catch(function () { window.prompt('Copy this link:', full); });
        } else { window.prompt('Copy this link:', full); }
      };
      box.parentNode.appendChild(copy);
      return;
    }
    // Desktop with no extension.
    say('No wallet found in this browser.<br><br>Install a browser wallet '
      + '(MetaMask, Rabby) and reload, or scan the QR with your phone and open '
      + 'the link inside your wallet app.', 'err');
  }

  say('Checking for a wallet…', 'busy');
  waitForEthereum(function (has) {
    if (!has) { showNoWallet(); return; }
    say('Wallet detected. One signature links it to your RUNECLAW account.', 'ok');
    btn.classList.remove('hidden');
  });

  btn.onclick = function () {
    btn.disabled = true;
    say('Waiting for your wallet…', 'busy');
    (async function () {
      try {
        var accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        var address = (accounts && accounts[0] || '').trim();
        if (!address) { say('No wallet account was shared.', 'err'); btn.disabled = false; return; }
        var n = await fetch(API + '/auth/wallet/nonce', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address: address }),
        }).then(function (r) { return r.json(); });
        if (!n.message) { say(n.error || 'Could not start linking.', 'err'); btn.disabled = false; return; }
        var signature = await window.ethereum.request({
          method: 'personal_sign', params: [n.message, address],
        });
        var v = await fetch(API + '/auth/wallet/link-by-code', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, address: address, signature: signature }),
        }).then(function (r) { return r.json(); });
        if (v.ok) {
          say('✅ <b>Wallet linked.</b> Back on your computer, the account card '
            + 'updates within a few seconds. You can close this page.', 'ok');
          btn.classList.add('hidden');
        } else {
          say(v.error || 'Linking failed — generate a fresh QR and try again.', 'err');
          btn.disabled = false;
        }
      } catch (e) {
        say('Linking was cancelled in the wallet.', 'err');
        btn.disabled = false;
      }
    })();
  };
})();
</script>
</body>
</html>
