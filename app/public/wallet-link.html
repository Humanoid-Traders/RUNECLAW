<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUNECLAW — Link your wallet</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="theme-color" content="#0a0b10">
<link rel="stylesheet" href="/styles.css?v=13">
<style>
  .wl-wrap { max-width: 440px; margin: 8vh auto; padding: 0 var(--s4); }
  .wl-card { background: var(--surface); border: 1px solid var(--line-2); border-radius: var(--radius-lg); padding: var(--s5); }
</style>
</head>
<body>
<div class="wl-wrap">
  <div class="wl-card">
    <h1 style="font-size:var(--fs-lg);margin-bottom:var(--s2)">🔗 Link this wallet to RUNECLAW</h1>
    <p class="muted small" style="margin-bottom:var(--s3)">
      Read-only linking: your wallet signs <b>one login message</b> — never a
      transaction, never an approval. RUNECLAW can then mirror balances and
      DeFi positions; it can never move funds.
    </p>
    <div id="state" class="small" style="color:var(--text-2)">Checking for a wallet…</div>
    <button class="btn btn--primary btn-block mt-3 hidden" id="linkBtn" type="button">Sign &amp; link wallet</button>
  </div>
</div>
<script>
(function () {
  var API = '/api';
  var state = document.getElementById('state');
  var btn = document.getElementById('linkBtn');
  var code = new URLSearchParams(location.search).get('code') || '';

  function say(html) { state.innerHTML = html; }

  if (!/^[0-9a-f]{32}$/.test(code)) {
    say('This link is missing its code — scan the QR on your computer again.');
    return;
  }

  // Scanning the QR opens this page in the phone's NORMAL browser (Safari /
  // Chrome), which injects no signer — so window.ethereum is absent even
  // though MetaMask is installed. Two things fix the dead end: (1) an in-app
  // browser (MetaMask etc.) often injects the provider a beat AFTER load, so
  // wait briefly before giving up; (2) if there's still no provider, hand the
  // user a ONE-TAP deep link that reopens THIS page (code preserved) inside
  // MetaMask's own browser, where the signer exists.
  function waitForEthereum(cb) {
    if (window.ethereum) return cb(true);
    var tries = 0;
    var t = setInterval(function () {
      if (window.ethereum) { clearInterval(t); cb(true); }
      else if (++tries >= 10) { clearInterval(t); cb(false); }  // ~3s — some in-app browsers inject late
    }, 300);
  }

  function showNoWallet() {
    var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');
    if (isMobile) {
      var hostPathQuery = location.host + location.pathname + location.search;
      var full = location.href;
      var enc = encodeURIComponent(full);
      // Universal deep links that reopen THIS page (code preserved) inside each
      // wallet's own dApp browser, where window.ethereum exists. Documented
      // universal-link forms only (app-scheme guesses that silently fail are
      // worse than the copy-link fallback below, which covers every other wallet).
      var wallets = [
        { name: 'MetaMask', href: 'https://metamask.app.link/dapp/' + hostPathQuery, primary: true },
        { name: 'Trust Wallet', href: 'https://link.trustwallet.com/open_url?url=' + enc },
        { name: 'Coinbase Wallet', href: 'https://go.cb-w.com/dapp?cb_url=' + enc },
        { name: 'Rainbow', href: 'https://rnbwapp.com/dapp?url=' + enc },
        { name: 'Phantom', href: 'https://phantom.app/ul/browse/' + enc + '?ref=' + encodeURIComponent(location.origin) },
        { name: 'Uniswap Wallet', href: 'https://uniswap.org/app?dappUrl=' + enc },
        { name: 'Zerion', href: 'https://link.zerion.io/905dU0Hd8ub?dappUrl=' + enc },
        { name: 'Bitget Wallet', href: 'https://bkcode.vip?action=dapp&url=' + enc },
      ];
      say('This is your phone\'s browser, which has no wallet signer.<br><br>'
        + 'Tap your wallet to reopen this page <b>inside it</b> — it signs and '
        + 'links automatically. Don\'t see yours? <b>Copy the link</b> and paste '
        + 'it into your wallet\'s in-app browser.');
      wallets.forEach(function (w) {
        var a = document.createElement('a');
        a.href = w.href;
        a.className = 'btn btn-block mt-2' + (w.primary ? ' btn--primary' : '');
        a.textContent = 'Open in ' + w.name;
        a.rel = 'noopener';
        state.parentNode.appendChild(a);
      });
      // Universal fallback: copy the link so ANY wallet (Rabby, OKX, imToken,
      // TokenPocket, Frame, Rainbow, …) can paste it into its dApp browser.
      var copy = document.createElement('button');
      copy.type = 'button';
      copy.className = 'btn btn-block mt-3';
      copy.textContent = '📋 Copy link for any other wallet';
      copy.onclick = function () {
        var done = function () { copy.textContent = '✅ Link copied — paste in your wallet\'s browser'; };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(full).then(done).catch(function () { window.prompt('Copy this link:', full); });
        } else { window.prompt('Copy this link:', full); }
      };
      state.parentNode.appendChild(copy);
      return;
    }
    // Desktop with no extension.
    say('No wallet found in this browser.<br><br>Install a browser wallet '
      + '(MetaMask, Rabby) and reload, or scan the QR with your phone and open '
      + 'the link inside your wallet app.');
  }

  say('Checking for a wallet…');
  waitForEthereum(function (has) {
    if (!has) { showNoWallet(); return; }
    say('Wallet detected. One signature links it to your RUNECLAW account.');
    btn.classList.remove('hidden');
  });

  btn.onclick = function () {
    btn.disabled = true;
    say('Waiting for your wallet…');
    (async function () {
      try {
        var accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        var address = (accounts && accounts[0] || '').trim();
        if (!address) { say('No wallet account was shared.'); btn.disabled = false; return; }
        var n = await fetch(API + '/auth/wallet/nonce', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address: address }),
        }).then(function (r) { return r.json(); });
        if (!n.message) { say(n.error || 'Could not start linking.'); btn.disabled = false; return; }
        var signature = await window.ethereum.request({
          method: 'personal_sign', params: [n.message, address],
        });
        var v = await fetch(API + '/auth/wallet/link-by-code', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, address: address, signature: signature }),
        }).then(function (r) { return r.json(); });
        if (v.ok) {
          say('✅ <b>Wallet linked.</b> Back on your computer, the account card '
            + 'updates within a few seconds. You can close this page.');
          btn.classList.add('hidden');
        } else {
          say(v.error || 'Linking failed — generate a fresh QR and try again.');
          btn.disabled = false;
        }
      } catch (e) {
        say('Linking was cancelled in the wallet.');
        btn.disabled = false;
      }
    })();
  };
})();
</script>
</body>
</html>
