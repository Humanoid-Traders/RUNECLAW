<style>
  html, body { height: 100%; }
  body { margin: 0; overflow: hidden; background: radial-gradient(120% 120% at 50% 0%, #0d1017 0%, var(--bg, #06070b) 70%); }
  .sm-top { position: fixed; top: 0; left: 0; right: 0; z-index: 5; display: flex; gap: var(--s3); align-items: center;
    padding: var(--s3) var(--s4); background: linear-gradient(#0a0b10cc, #0a0b1000); pointer-events: none; flex-wrap: wrap; }
  .sm-top > * { pointer-events: auto; }
  .sm-title { font-family: var(--font-display); letter-spacing: .04em; font-size: clamp(15px, 2.6vw, 22px); }
  .sm-title b { color: var(--gold-bright); }
  .sm-seg { display: inline-flex; border: 1px solid var(--line-2); border-radius: 999px; overflow: hidden; }
  .sm-seg button { background: transparent; color: var(--text-2); border: 0; padding: 6px 14px; font: inherit; font-size: var(--fs-sm); cursor: pointer; }
  .sm-seg button[aria-pressed="true"].long { background: var(--up-dim, #12351f); color: var(--up); }
  .sm-seg button[aria-pressed="true"].short { background: var(--down-dim, #3a1720); color: var(--down); }
  .sm-axes { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .sm-axes label { color: var(--text-3); font-size: var(--fs-xs); display: inline-flex; align-items: center; gap: 3px; }
  .sm-axes select { background: var(--surface); border: 1px solid var(--line); color: var(--text-1); border-radius: var(--radius-sm); padding: 4px 6px; font: inherit; font-size: var(--fs-xs); }
  .sm-canvas { position: fixed; inset: 0; z-index: 1; display: block; touch-action: none; }
  .sm-hint { position: fixed; left: 0; right: 0; bottom: 8px; z-index: 3; text-align: center; color: var(--text-3); font-size: var(--fs-xs); pointer-events: none; padding: 0 var(--s4); }
  .sm-hint a { pointer-events: auto; }
  .sm-count { position: fixed; left: var(--s4); bottom: 34px; z-index: 3; color: var(--text-3); font-size: var(--fs-xs); font-variant-numeric: tabular-nums; }
  /* Detail panel */
  .sm-panel { position: fixed; z-index: 6; top: 64px; right: var(--s4); width: min(360px, 92vw); max-height: calc(100vh - 90px); overflow: auto;
    background: var(--surface); border: 1px solid var(--line-2); border-top: 3px solid var(--gold-bright); border-radius: var(--radius); padding: var(--s4);
    box-shadow: var(--shadow); transform: translateY(8px); opacity: 0; pointer-events: none; transition: opacity .18s ease, transform .18s ease; }
  .sm-panel.open { opacity: 1; transform: none; pointer-events: auto; }
  @media (max-width: 560px) { .sm-panel { left: var(--s3); right: var(--s3); width: auto; top: auto; bottom: 8px; max-height: 62vh; } }
  .sm-panel .x { position: absolute; top: 8px; right: 10px; cursor: pointer; color: var(--text-3); background: none; border: 0; font-size: 20px; line-height: 1; }
  .sm-panel h2 { font-family: var(--font-display); letter-spacing: .03em; font-size: var(--fs-lg); margin: 0; }
  .sm-panel .px { color: var(--text-2); font-family: var(--font-data); }
  .sm-ls { display: flex; gap: var(--s2); margin: var(--s3) 0; }
  .sm-ls .c { flex: 1; text-align: center; border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 8px; }
  .sm-ls .c .k { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-3); }
  .sm-ls .c .v { font-family: var(--font-data); font-size: 22px; font-weight: 700; }
  .sm-ls .c.long .v { color: var(--up); } .sm-ls .c.short .v { color: var(--down); }
  .sm-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px var(--s3); margin: var(--s3) 0; font-size: var(--fs-sm); }
  .sm-stats .k { color: var(--text-3); } .sm-stats .v { font-family: var(--font-data); font-variant-numeric: tabular-nums; text-align: right; }
  .sm-fac { border-top: 1px solid var(--line); margin-top: var(--s3); padding-top: var(--s3); }
  .sm-fac .h { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-3); margin-bottom: 6px; }
  .sm-frow { display: grid; grid-template-columns: 78px 1fr 46px; align-items: center; gap: 8px; margin: 5px 0; font-size: var(--fs-xs); }
  .sm-frow .bar { position: relative; height: 8px; border-radius: 4px; background: var(--surface-2); }
  .sm-frow .bar i { position: absolute; top: 0; bottom: 0; left: 50%; border-radius: 4px; }
  .sm-frow .bar .mid { position: absolute; left: 50%; top: -2px; bottom: -2px; width: 1px; background: var(--line-2); }
  .sm-frow .val { text-align: right; font-family: var(--font-data); font-variant-numeric: tabular-nums; }
  .sm-frow .bar i { transition: width .6s cubic-bezier(.2,.8,.2,1), left .6s cubic-bezier(.2,.8,.2,1); }
  .sm-ls .c { transition: border-color .2s ease, box-shadow .2s ease; }
  .sm-ls .c.on.long { border-color: rgba(47,191,113,.55); box-shadow: 0 0 0 1px rgba(47,191,113,.25), 0 6px 20px -10px rgba(47,191,113,.5); }
  .sm-ls .c.on.short { border-color: rgba(224,82,82,.55); box-shadow: 0 0 0 1px rgba(224,82,82,.25), 0 6px 20px -10px rgba(224,82,82,.5); }
  .sm-ls .c .v { transition: color .2s ease; }
  /* "Trade in RUNECLAW" — the highlighted in-app venue, with a soft gold pulse */
  .sm-v--rc { border-color: var(--gold-bright) !important; position: relative; overflow: hidden;
    background: linear-gradient(100deg, rgba(214,178,90,.10), transparent 60%); }
  .sm-v--rc::after { content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
    box-shadow: 0 0 0 0 rgba(214,178,90,.45); animation: smPulse 2.6s ease-out infinite; }
  @keyframes smPulse { 0% { box-shadow: 0 0 0 0 rgba(214,178,90,.35); } 70%,100% { box-shadow: 0 0 0 6px rgba(214,178,90,0); } }
  /* Floating hover tooltip over the 3D scene */
  .sm-tip { position: fixed; z-index: 7; pointer-events: none; transform: translate(-50%,-160%);
    background: var(--surface); border: 1px solid var(--line-2); border-radius: var(--radius-sm);
    padding: 5px 9px; font-size: var(--fs-xs); font-family: var(--font-data); white-space: nowrap;
    box-shadow: var(--shadow); opacity: 0; transition: opacity .12s ease; }
  .sm-tip.on { opacity: 1; }
  .sm-tip .sm-tip-ls { display: block; color: var(--text-3); font-size: 10px; margin-top: 2px; }
  /* Projected axis labels pinned to the box ends */
  .sm-axlabel { position: fixed; z-index: 4; top: 0; left: 0; pointer-events: none;
    font-family: var(--font-data); font-size: 10px; letter-spacing: .05em; text-transform: uppercase;
    color: var(--text-3); background: rgba(10,11,16,.55); padding: 2px 7px; border-radius: 999px;
    border: 1px solid var(--line); transition: opacity .3s ease; white-space: nowrap; }
  .sm-ax-x { color: #f2a37a; } .sm-ax-y { color: #7ad1a0; } .sm-ax-z { color: #8ab6f2; }
  @media (prefers-reduced-motion: reduce) { .sm-v--rc::after { animation: none; } }
  .sm-venues { border-top: 1px solid var(--line); margin-top: var(--s3); padding-top: var(--s3); }
  .sm-venues .h { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-3); margin-bottom: 6px; }
  .sm-vgrid { display: flex; flex-direction: column; gap: 6px; }
  .sm-v { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid var(--line); border-radius: var(--radius-sm); color: inherit; text-decoration: none; }
  .sm-v:hover { border-color: var(--line-2); background: var(--surface-2); }
  .sm-v .nm { font-weight: 600; }
  .sm-v .tag { font-size: 9px; padding: 2px 6px; border-radius: 999px; background: var(--surface-2); color: var(--text-3); border: 1px solid var(--line-2); }
  .sm-v .tag.dex { color: var(--gold-bright); }
  .sm-v .go { margin-left: auto; color: var(--text-3); font-size: var(--fs-xs); }
  .sm-v .rc { font-size: 9px; color: var(--up); }
  .sm-disc { color: var(--text-3); font-size: 10px; margin-top: var(--s3); line-height: 1.5; }
  .sm-fallback { position: fixed; inset: 0; z-index: 2; overflow: auto; padding: 72px var(--s4) var(--s5); display: none; }
  .sm-fallback table { width: 100%; border-collapse: collapse; font-size: var(--fs-sm); }
  .sm-fallback th, .sm-fallback td { padding: 7px 8px; border-bottom: 1px solid var(--line); text-align: right; }
  .sm-fallback th:first-child, .sm-fallback td:first-child { text-align: left; }
  .sm-empty { position: fixed; inset: 0; display: grid; place-items: center; color: var(--text-3); z-index: 2; padding: var(--s4); text-align: center; }
</style>

<div class="sm-top">
