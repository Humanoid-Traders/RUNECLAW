<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RUNECLAW — Dashboard</title>
<meta name="description" content="RUNECLAW trading dashboard: portfolio, markets, signals, trading, and live engine telemetry.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="256x256" href="/app_icon_256.png">
<link rel="apple-touch-icon" href="/app_icon_512.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b10">
<link rel="preload" href="/fonts/cinzel-700.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/styles.css?v=20">
</head>
<body>
<a class="skip-link" href="#view-root" data-i18n="dash.skip">Skip to content</a>

<header class="topbar">
  <a class="brand" href="/"><svg class="brand-mark" aria-hidden="true"><use href="#brand-mark"></use></svg>RUNECLAW<span class="brand-sub">Command Core</span></a>
  <span id="connChip" class="chip chip--offline">● CONNECTING</span>
  <div class="spacer"></div>
  <div class="top-actions">
    <span id="modeChip" class="chip chip--paper hidden">PAPER</span>
    <span id="pulseDot" class="pulse-dot" title="Engine stream connecting…" aria-hidden="true"></span>
    <span data-i18n-switcher></span>
    <a class="btn btn--ghost btn--sm" href="/" id="accountLink" data-i18n="dash.account">Account</a>
  </div>
</header>

<div class="shell">
  <nav class="rail" id="railNav" aria-label="Dashboard sections"></nav>

  <main class="content" id="view-root">
    <!-- Views are rendered by js/dashboard.js into this container. -->
    <div id="viewContainer" class="stack">
      <div class="panel"><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>
    </div>
  </main>
</div>

<nav class="tabbar" id="tabbarNav" aria-label="Dashboard sections"></nav>

<!-- Chat -->
<button id="chatFab" class="chat-fab hidden" hidden aria-label="Open RUNECLAW chat">
  <svg class="icon" aria-hidden="true"><use href="#icon-chat"></use></svg>
</button>
<section id="chatDrawer" class="chat-drawer hidden" hidden role="dialog" aria-label="RUNECLAW chat">
  <div class="chat-head">
    <span class="t"><svg class="icon" aria-hidden="true"><use href="#icon-sparkle"></use></svg>RUNECLAW — AI ANALYST</span>
    <button class="chat-tts" id="chatTts" type="button" aria-pressed="false"
      aria-label="Read replies aloud" title="Read replies aloud" hidden>🔇</button>
    <button class="chat-close" id="chatClose" aria-label="Close chat">&times;</button>
  </div>
  <div id="chatMeta" class="chat-meta" hidden aria-label="Your live portfolio"></div>
  <div id="chatBody" class="chat-body" aria-live="polite"></div>
  <div id="chatChips" class="chat-chips" aria-label="Suggested prompts"></div>
  <form class="chat-inputrow" id="chatForm">
    <label class="visually-hidden" for="chatInput">Message the RUNECLAW assistant</label>
    <input id="chatInput" class="input" type="text" maxlength="2000" autocomplete="off"
           placeholder='Ask anything — or "buy SOL 71 sl 70 tp 76"' data-i18n-attr="placeholder:dash.chat_ph">
    <button class="btn" id="chatMic" type="button" aria-pressed="false"
      aria-label="Dictate a message" title="Dictate a message" hidden>🎤</button>
    <button class="btn btn--primary" id="chatSend" type="submit" aria-label="Send message">
      <svg class="icon" style="width:16px;height:16px" aria-hidden="true"><use href="#icon-send"></use></svg>
    </button>
  </form>
</section>

<!-- Trade confirm modal -->
<div id="tradeModal" class="modal hidden" hidden role="dialog" aria-modal="true" aria-label="Confirm trade">
  <div class="modal-card">
    <h2 data-i18n="dash.confirm_trade">Confirm trade</h2>
    <div id="tradeModalBody"></div>
    <div class="row mt-4">
      <button class="btn btn--primary" id="tradeModalConfirm" style="flex:1" data-i18n="dash.confirm">Confirm</button>
      <button class="btn" id="tradeModalCancel" style="flex:1" data-i18n="dash.cancel_order">Cancel order</button>
    </div>
    <p id="tradeModalMsg" class="muted small mt-2" aria-live="polite"></p>
  </div>
</div>

<!-- Symbol detail drill-down modal -->
<div id="symModal" class="modal hidden" hidden role="dialog" aria-modal="true" aria-label="Symbol detail">
  <div class="modal-card" style="max-width:560px;width:100%;max-height:88vh;overflow:auto">
    <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:var(--s2)">
      <h2 id="symModalTitle">Symbol</h2>
      <button class="btn btn--ghost btn--sm" id="symModalClose" aria-label="Close">&times;</button>
    </div>
    <div id="symModalBody"><div class="skel"></div><div class="skel"></div></div>
  </div>
</div>

<script src="/js/i18n.js?v=5"></script>
<script src="/js/icons.js?v=3"></script>
<script src="/js/app.js?v=3"></script>
<script src="/js/wallet_picker.js" defer></script>
<script src="/js/chat.js?v=24" defer></script>
<!-- 3D AI Viking agent: import map + reactive viewer (defers; no-op if the model is absent). -->
<script type="importmap">
{ "imports": {
  "three": "/vendor/three/three.module.min.js",
  "three/addons/": "/vendor/three/examples/jsm/"
}}
</script>
<script>
  (function () {
    try {
      if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var load = function () { import('/js/mascot3d.js?v=3').catch(function () {}); };
      if ('requestIdleCallback' in window) requestIdleCallback(load, { timeout: 2500 });
      else setTimeout(load, 1200);
    } catch (e) { }
  })();
</script>
<script src="/vendor/lightweight-charts.standalone.production.js" defer></script>
<script src="/js/radar3d.js?v=3" defer></script>
<script src="/js/charts2d.js?v=1" defer></script>
<script src="/js/dashboard.js?v=95" defer></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}</script>
</body>
</html>
