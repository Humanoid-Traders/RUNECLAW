# =============================================================================
# RUNECLAW v2 Docker Compose -- Bot + API Bridge + Redis + Nginx
# =============================================================================

services:

  # -- Telegram bot -----------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        BUILD_SHA: ${BUILD_SHA:-dev}
    image: runeclaw:latest
    container_name: runeclaw-bot
    restart: unless-stopped
    command: python -m bot.main --mode telegram
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      api_bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8080)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - runeclaw_net
    deploy:
      resources:
        limits:   { cpus: '1.0', memory: '2G' }
        reservations: { cpus: '0.5', memory: '512M' }

  # -- API Bridge (FastAPI) ---------------------------------------------------
  api_bridge:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        BUILD_SHA: ${BUILD_SHA:-dev}
    image: runeclaw:latest
    container_name: runeclaw-api
    restart: unless-stopped
    command: >
      uvicorn api_bridge:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --proxy-headers
      --forwarded-allow-ips='*'
    env_file: .env
    expose:
      - "8000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s
    networks:
      - runeclaw_net
    deploy:
      resources:
        limits:   { cpus: '1.0', memory: '1G' }
        reservations: { cpus: '0.25', memory: '256M' }

  # -- Redis ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: runeclaw-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-changeme_redis_secret}
    healthcheck:
      test: ["CMD", "redis-cli",
             "-a", "${REDIS_PASSWORD:-changeme_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - runeclaw_net
    deploy:
      resources:
        limits:   { cpus: '0.5', memory: '256M' }
        reservations: { cpus: '0.25', memory: '64M' }

  # -- Nginx TLS reverse proxy ------------------------------------------------
  # Serves dashboard on 443, proxies /api/* -> api_bridge:8000
  # Requires: certbot certs at /etc/letsencrypt/live/YOUR_DOMAIN/
  # To skip TLS in dev: comment out nginx and expose api_bridge:8000 directly
  nginx:
    image: nginx:1.27-alpine
    container_name: runeclaw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./website:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api_bridge:
        condition: service_healthy
    networks:
      - runeclaw_net
    deploy:
      resources:
        limits:   { cpus: '0.25', memory: '128M' }

volumes:
  redis_data:

networks:
  runeclaw_net:
    driver: bridge
