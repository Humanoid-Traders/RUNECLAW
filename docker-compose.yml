# =============================================================================
# RUNECLAW Docker Compose
# =============================================================================

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: runeclaw-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    command: python -m bot.main --mode telegram
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8080)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '2G'
        reservations:
          cpus: '0.5'
          memory: '512M'

  redis:
    image: redis:7-alpine
    container_name: runeclaw-redis
    restart: unless-stopped
    # F-04 FIX: Do NOT expose Redis on host network. Bot connects via
    # internal docker network name "redis". Password required.
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '256M'
        reservations:
          cpus: '0.25'
          memory: '64M'

volumes:
  redis-data:
