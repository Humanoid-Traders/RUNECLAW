# =============================================================================
# RUNECLAW Docker Compose
# =============================================================================

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: runeclaw-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    command: python -m bot.main --mode telegram
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '2G'
        reservations:
          cpus: '0.5'
          memory: '512M'

  redis:
    image: redis:7-alpine
    container_name: runeclaw-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '256M'
        reservations:
          cpus: '0.25'
          memory: '64M'

volumes:
  redis-data:
