# =============================================================================
# RUNECLAW nginx.conf
# File: nginx.conf  (repo root — mounted into nginx container)
#
# Replace YOUR_DOMAIN with your actual domain, e.g. runeclaw.yourdomain.com
# TLS certs from Let's Encrypt (certbot).
#
# To get certs (run once on VPS before starting nginx):
#   sudo certbot certonly --standalone -d YOUR_DOMAIN
# =============================================================================

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # TLS
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            DENY                                  always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            "no-referrer-when-downgrade"          always;
    add_header Content-Security-Policy    "default-src 'self' https://api.anthropic.com; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline';" always;

    # ── Dashboard static files ──────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index dashboard-pro.html index.html;

    location / {
        try_files $uri $uri/ /dashboard-pro.html;
        add_header Cache-Control "no-cache";
    }

    # Serve static assets with long cache
    location ~* \.(js|css|png|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── API Bridge proxy ────────────────────────────────────────────────────
    # All /api/* routes proxy to FastAPI on api_bridge:8000
    # The dashboard calls these with Authorization: Bearer $DASHBOARD_TOKEN
    location /api/ {
        # Strip /api prefix before forwarding
        rewrite ^/api/(.*) /$1 break;

        proxy_pass         http://api_bridge:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts: scan can take up to 90s for 67 symbols
        proxy_read_timeout  120s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 10s;

        # CORS for dashboard origin
        add_header Access-Control-Allow-Origin  "https://YOUR_DOMAIN" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"   always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Direct /health shortcut (no /api prefix needed for smoke tests)
    location = /health {
        proxy_pass http://api_bridge:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Block .env and hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;
}
